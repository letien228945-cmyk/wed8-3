
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:white;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:45px;
text-shadow:0 0 10px pink;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4b7d,#ff85a2);
color:white;
cursor:pointer;
box-shadow:0 0 15px pink;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px hotpink;
}

#message{
margin-top:30px;
font-size:22px;
max-width:750px;
margin-left:auto;
margin-right:auto;
display:none;
line-height:1.7;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
box-shadow:0 0 20px pink;
white-space:pre-line;
}

#credit{
position:fixed;
bottom:15px;
right:20px;
font-size:18px;
font-style:italic;
opacity:0.8;
text-shadow:0 0 10px pink;
}

/* ảnh rơi */

.falling{
position:fixed;
top:-100px;
width:80px;
border-radius:10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

/* tim hoa rơi */

.fall{
position:fixed;
top:-50px;
font-size:25px;
animation:fallDown linear forwards;
}

@keyframes fallDown{
to{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<!-- nhạc nền -->

<iframe
width="0"
height="0"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/letchill/lofi-chill-khong-loi-nhung-ban-nhac-chill-thu-gian-nhe-nhang-cho-cu-dem-nhac-lofi-2022&auto_play=true">
</iframe>

<h1>🌸 Chúc Mừng 8/3 🌸</h1>

<marquee scrollamount="6">
💐 Chúc các bạn nữ và cô giáo một ngày 8/3 thật vui vẻ, luôn xinh đẹp và hạnh phúc 💐
</marquee>

<br><br>

<button onclick="startTyping()">💌 Bấm để xem lời chúc</button>

<div id="message"></div>

<div id="credit">By Lê Tiến</div>

<script>

const text = `Nhân ngày Quốc tế Phụ nữ 8/3, xin gửi những lời chúc tốt đẹp nhất đến cô giáo và tất cả các bạn nữ trong lớp.

Chúc cô luôn mạnh khỏe, hạnh phúc và luôn tràn đầy nhiệt huyết để tiếp tục dìu dắt chúng em trên con đường học tập.

Chúc các bạn nữ luôn xinh đẹp, vui vẻ, tự tin và đạt được thật nhiều thành công trong học tập cũng như cuộc sống.

Chúc mọi người một ngày 8/3 thật ý nghĩa và tràn đầy niềm vui! 💐`;

let index = 0;

function startTyping(){

document.getElementById("message").style.display="block";

function type(){

if(index < text.length){

document.getElementById("message").innerHTML += text.charAt(index);

index++;

setTimeout(type,35);

}

}

type();

}

/* ảnh rơi */

const images=[
"anh1.jpg","anh2.jpg","anh3.jpg","anh4.jpg","anh5.jpg",
"anh6.jpg","anh7.jpg","anh8.jpg","anh9.jpg","anh10.jpg",
"anh11.jpg","anh12.jpg","anh13.jpg","anh14.jpg","anh15.jpg",
"anh16.jpg","anh17.jpg","anh18.jpg","anh19.jpg","anh20.jpg",
"anh21.jpg","anh22.jpg","anh23.jpg","anh24.jpg","anh25.jpg"
];

function createFallingImage(){

const img=document.createElement("img");

img.src=images[Math.floor(Math.random()*images.length)];

img.classList.add("falling");

img.style.left=Math.random()*100+"vw";

img.style.animationDuration=3+Math.random()*5+"s";

document.body.appendChild(img);

setTimeout(()=>{img.remove();},8000);

}

setInterval(createFallingImage,500);

/* tim rơi */

function createHeart(){

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.classList.add("fall");

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=3+Math.random()*5+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},8000);

}

setInterval(createHeart,800);

/* hoa rơi */

function createFlower(){

const flower=document.createElement("div");

flower.innerHTML="🌸";

flower.classList.add("fall");

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=4+Math.random()*5+"s";

document.body.appendChild(flower);

setTimeout(()=>{flower.remove();},8000);

}

setInterval(createFlower,1000);

</script>

</body>
</html>
